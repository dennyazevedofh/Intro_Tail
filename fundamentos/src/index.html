<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tailwind - Fundamentos</title>
	<link rel="stylesheet" href="./css/style.css">
</head>
<body>
	<h1 class="bg-green-500 text-yellow-500 hover:bg-yellow-300 hover:text-green-700">Tudo são classes</h1>
	<button class="bg-blue-500 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Botão</button>
	<button class="bg-green-500 text-white font-bold py-2 px-4 rounded hover:bg-green-700">Botão</button>
	<button class="bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-700">Botão</button>
	<!-- Responsividade -->
	<div class="w-4 h-4 bg-green-400 md:w-6 md:bg-blue-400 lg:w-10 lg:h-10 lg:bg-purple-400"></div>
	<!-- pseudo classes e eventos -->
	<div>
		<input type="text" placeholder="Clica em min"
		class="bg-gray-300 text-gray-900 focus:bg-red-600 focus:text-white">
	</div>
	<!-- componentes -->
	<button class="btn-blue">Botão Azul</button>
	<button class="btn-green">Botão Verde</button>

</body>
</html>
